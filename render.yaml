services:
  - type: web
    name: groweasy-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: true
      - key: OPENAI_API_KEY
        sync: true
    disk:
      name: groweasy-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
