services:
  - type: web
    name: groweasy-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        value: "REPLACE_WITH_YOUR_GEMINI_API_KEY"
      - key: OPENAI_API_KEY
        value: "REPLACE_WITH_YOUR_OPENAI_API_KEY"
